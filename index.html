<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shared Log Architecture Visualizer</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Icon Components (Replacing lucide-react for standalone usage) ---
    const Icon = ({ children, size = 24, className = "", title }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {title && <title>{title}</title>}
        {children}
      </svg>
    );
    const Database = (p) => <Icon {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></Icon>;
    const Send = (p) => <Icon {...p}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></Icon>;
    const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
    const RefreshCw = (p) => <Icon {...p}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></Icon>;
    const Filter = (p) => <Icon {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></Icon>;
    const Calculator = (p) => <Icon {...p}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></Icon>;
    const Activity = (p) => <Icon {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></Icon>;
    const ArrowRight = (p) => <Icon {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></Icon>;
    const Tag = (p) => <Icon {...p}><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></Icon>;
    const Layout = (p) => <Icon {...p}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></Icon>;
    const Layers = (p) => <Icon {...p}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></Icon>;

    // --- Reducer Logic ---
    const processLog = (consumer, logEntry) => {
      // Check filter: if consumer has a filter tag, the log must include it
      if (consumer.filterTag && !logEntry.tags.includes(consumer.filterTag)) {
        return consumer;
      }

      let newVal = consumer.currentValue;
      let val = logEntry.payload;

      if (logEntry.type === 'number') {
        switch (consumer.reducer) {
          case 'SUM': newVal = (newVal || 0) + val; break;
          case 'SUBTRACT': newVal = newVal === null ? val : newVal - val; break;
          case 'MULTIPLY': newVal = newVal === null ? val : newVal * val; break;
          case 'DIVIDE': newVal = newVal === null ? val : (val !== 0 ? newVal / val : newVal); break;
          case 'COUNT': newVal = (newVal || 0) + 1; break;
          case 'CONCAT': newVal = newVal === null ? String(val) : `${newVal}, ${val}`; break;
          default: break;
        }
      } else {
        // String processing
        switch (consumer.reducer) {
          case 'CONCAT': newVal = newVal === null ? val : `${newVal} ${val}`; break;
          case 'UPPERCASE_LATEST': newVal = String(val).toUpperCase(); break;
          case 'LOWERCASE_LATEST': newVal = String(val).toLowerCase(); break;
          case 'COUNT': newVal = (newVal || 0) + 1; break;
          default: break; // If math is applied to string, we ignore to prevent NaNs
        }
      }

      return { ...consumer, currentValue: newVal, lastProcessedSeqNum: logEntry.seqNum };
    };

    function App() {
      // --- State ---
      const [logs, setLogs] = useState([]);
      const [consumers, setConsumers] = useState([]);
      
      // Publisher State
      const [pubPayload, setPubPayload] = useState('');
      const [pubTags, setPubTags] = useState('');

      // New Consumer State
      const [newConsName, setNewConsName] = useState('');
      const [newConsFilter, setNewConsFilter] = useState('');
      const [newConsReducer, setNewConsReducer] = useState('SUM');

      // Refs for auto-scrolling
      const logContainerRef = useRef(null);

      // --- Effects ---
      // Auto-scroll log when new entries are added
      useEffect(() => {
        if (logContainerRef.current) {
          logContainerRef.current.scrollLeft = logContainerRef.current.scrollWidth;
        }
      }, [logs]);

      // Reactive processing: when logs change, consumers update
      useEffect(() => {
        if (logs.length === 0) return;
        
        setConsumers(prev => prev.map(c => {
          let updatedC = { ...c };
          const unprocessedLogs = logs.filter(l => l.seqNum > c.lastProcessedSeqNum);
          
          unprocessedLogs.forEach(l => {
            updatedC = processLog(updatedC, l);
          });
          
          return updatedC;
        }));
      }, [logs]);

      // --- Handlers ---
      const handlePublish = (payloadStr, tagsStr, e = null) => {
        if (e) e.preventDefault();
        if (payloadStr.trim() === '') return;

        const isNumber = !isNaN(parseFloat(payloadStr)) && isFinite(payloadStr);
        const parsedPayload = isNumber ? parseFloat(payloadStr) : payloadStr;
        const tagsArray = tagsStr.split(',').map(t => t.trim().toLowerCase()).filter(t => t);

        const newLog = {
          seqNum: logs.length > 0 ? logs[logs.length - 1].seqNum + 1 : 1,
          payload: parsedPayload,
          type: isNumber ? 'number' : 'string',
          tags: tagsArray.length > 0 ? tagsArray : ['general']
        };

        setLogs(prev => [...prev, newLog]);
      };

      const handlePublishSubmit = (e) => {
        handlePublish(pubPayload, pubTags, e);
        setPubPayload('');
        setPubTags('');
      };

      const handleAddConsumer = (e) => {
        e.preventDefault();
        let initialConsumer = {
          id: Date.now().toString(),
          name: newConsName || `Consumer ${consumers.length + 1}`,
          filterTag: newConsFilter.trim().toLowerCase(),
          reducer: newConsReducer,
          currentValue: null,
          lastProcessedSeqNum: 0
        };

        // Retroactively process all existing logs for this new consumer
        logs.forEach(log => {
          initialConsumer = processLog(initialConsumer, log);
        });

        setConsumers([...consumers, initialConsumer]);
        setNewConsName('');
        setNewConsFilter('');
      };

      const handleRepublish = (consumer, republishTag) => {
        if (consumer.currentValue === null) return;
        handlePublish(String(consumer.currentValue), republishTag);
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-900 font-sans p-4 md:p-8">
          <div className="max-w-7xl mx-auto space-y-8">
            
            {/* Header */}
            <header className="flex items-center space-x-3 mb-8">
              <div className="p-3 bg-blue-600 text-white rounded-xl shadow-lg shadow-blue-200">
                <Layers size={28} />
              </div>
              <div>
                <h1 className="text-3xl font-bold tracking-tight text-slate-900">Shared Log Architecture</h1>
                <p className="text-slate-500 font-medium">Append-only data streams, materialized views, and feedback loops.</p>
              </div>
            </header>

            {/* TOP SECTION: Publish & Log Tape */}
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
              
              {/* Publisher Toolbar */}
              <div className="bg-slate-100/50 p-4 border-b border-slate-200">
                <form onSubmit={handlePublishSubmit} className="flex flex-col md:flex-row gap-4 items-end">
                  <div className="flex-1 w-full">
                    <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Payload (Number or String)</label>
                    <div className="relative">
                      <Activity className="absolute left-3 top-2.5 text-slate-400" size={18} />
                      <input 
                        type="text" 
                        value={pubPayload}
                        onChange={(e) => setPubPayload(e.target.value)}
                        placeholder="e.g. 42 or 'User Signed Up'"
                        className="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                      />
                    </div>
                  </div>
                  <div className="flex-1 w-full">
                    <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Tags (Comma separated)</label>
                    <div className="relative">
                      <Tag className="absolute left-3 top-2.5 text-slate-400" size={18} />
                      <input 
                        type="text" 
                        value={pubTags}
                        onChange={(e) => setPubTags(e.target.value)}
                        placeholder="e.g. sensor, temperature"
                        className="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                      />
                    </div>
                  </div>
                  <button 
                    type="submit"
                    disabled={!pubPayload.trim()}
                    className="w-full md:w-auto bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white font-semibold py-2 px-6 rounded-lg shadow-sm transition-all flex items-center justify-center space-x-2"
                  >
                    <Send size={18} />
                    <span>Publish</span>
                  </button>
                </form>
              </div>

              {/* The Visual Log */}
              <div className="p-6">
                <div className="flex items-center space-x-2 mb-4 text-slate-600 font-semibold">
                  <Database size={20} className="text-blue-500" />
                  <h2>The Central Shared Log</h2>
                  <span className="text-sm font-normal text-slate-400">({logs.length} events)</span>
                </div>
                
                <div 
                  ref={logContainerRef}
                  className="flex space-x-4 overflow-x-auto pb-4 scroll-smooth min-h-[140px] items-center"
                >
                  {logs.length === 0 ? (
                    <div className="w-full text-center text-slate-400 py-8 border-2 border-dashed border-slate-200 rounded-xl">
                      Log is empty. Publish your first event!
                    </div>
                  ) : (
                    logs.map((log, idx) => (
                      <div key={idx} className="flex-shrink-0 flex items-center">
                        <div className="w-64 bg-slate-800 text-white rounded-xl shadow-md border border-slate-700 overflow-hidden flex flex-col relative transform transition-transform hover:-translate-y-1">
                          <div className="bg-slate-900 px-3 py-1.5 flex justify-between items-center border-b border-slate-700 text-xs font-mono">
                            <span className="text-blue-400">SeqNum: {log.seqNum}</span>
                            <span className="text-slate-500">{log.type}</span>
                          </div>
                          <div className="p-4 flex-1 flex items-center justify-center text-center">
                            <span className="text-lg font-mono truncate w-full" title={String(log.payload)}>
                              {String(log.payload)}
                            </span>
                          </div>
                          <div className="bg-slate-700/50 px-3 py-2 flex flex-wrap gap-1">
                            {log.tags.map(tag => (
                              <span key={tag} className="text-[10px] bg-slate-600 text-slate-200 px-2 py-0.5 rounded-full uppercase font-bold tracking-wider">
                                {tag}
                              </span>
                            ))}
                          </div>
                        </div>
                        {idx < logs.length - 1 && (
                          <ArrowRight className="text-slate-300 mx-2 flex-shrink-0" size={24} />
                        )}
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>

            {/* BOTTOM SECTION: Consumers */}
            <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
              
              {/* Add Consumer Form */}
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 lg:col-span-1 h-fit">
                <h3 className="text-lg font-bold text-slate-800 flex items-center space-x-2 mb-4">
                  <Plus className="text-emerald-500" size={20} />
                  <span>Add Consumer</span>
                </h3>
                <form onSubmit={handleAddConsumer} className="space-y-4">
                  <div>
                    <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Consumer Name</label>
                    <input 
                      type="text" 
                      value={newConsName}
                      onChange={(e) => setNewConsName(e.target.value)}
                      placeholder="e.g. Total Revenue"
                      className="w-full px-3 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-emerald-500 outline-none text-sm"
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Filter Tag (Optional)</label>
                    <div className="relative">
                      <Filter className="absolute left-2.5 top-2.5 text-slate-400" size={16} />
                      <input 
                        type="text" 
                        value={newConsFilter}
                        onChange={(e) => setNewConsFilter(e.target.value)}
                        placeholder="e.g. payment"
                        className="w-full pl-8 pr-3 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-emerald-500 outline-none text-sm"
                      />
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Reducer / Operation</label>
                    <div className="relative">
                      <Calculator className="absolute left-2.5 top-2.5 text-slate-400" size={16} />
                      <select 
                        value={newConsReducer}
                        onChange={(e) => setNewConsReducer(e.target.value)}
                        className="w-full pl-8 pr-3 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-emerald-500 outline-none text-sm appearance-none bg-white"
                      >
                        <optgroup label="Math (Numbers)">
                          <option value="SUM">Sum (+)</option>
                          <option value="SUBTRACT">Subtract (-)</option>
                          <option value="MULTIPLY">Multiply (*)</option>
                          <option value="DIVIDE">Divide (/)</option>
                        </optgroup>
                        <optgroup label="Text (Strings)">
                          <option value="CONCAT">Append / Concat</option>
                          <option value="UPPERCASE_LATEST">Uppercase (Latest)</option>
                          <option value="LOWERCASE_LATEST">Lowercase (Latest)</option>
                        </optgroup>
                        <optgroup label="General">
                          <option value="COUNT">Count Events</option>
                        </optgroup>
                      </select>
                    </div>
                  </div>
                  <button 
                    type="submit"
                    className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 rounded-lg shadow-sm transition-all flex items-center justify-center space-x-2"
                  >
                    <Plus size={18} />
                    <span>Create View</span>
                  </button>
                </form>
              </div>

              {/* Consumers Grid */}
              <div className="lg:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-6">
                {consumers.length === 0 ? (
                  <div className="col-span-full flex flex-col items-center justify-center py-12 bg-white rounded-2xl border-2 border-dashed border-slate-200 text-slate-400">
                    <Layout size={48} className="mb-4 text-slate-300" />
                    <p>No consumers active.</p>
                    <p className="text-sm mt-1">Add a consumer to build materialized views from the log.</p>
                  </div>
                ) : (
                  consumers.map(consumer => (
                    <ConsumerCard 
                      key={consumer.id} 
                      consumer={consumer} 
                      onRepublish={handleRepublish} 
                    />
                  ))
                )}
              </div>

            </div>
          </div>
        </div>
      );
    }

    // --- Subcomponents ---

    function ConsumerCard({ consumer, onRepublish }) {
      const [republishTag, setRepublishTag] = useState(`${consumer.name.toLowerCase().replace(/\s+/g, '-')}-output`);
      const [showRepublishOpts, setShowRepublishOpts] = useState(false);

      return (
        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col relative">
          {/* Sync indicator */}
          <div className="absolute top-4 right-4 flex items-center space-x-1 bg-emerald-50 text-emerald-600 px-2 py-1 rounded-md text-xs font-bold">
            <Activity size={12} className="animate-pulse" />
            <span>Seq: {consumer.lastProcessedSeqNum}</span>
          </div>

          <div className="p-5 flex-1 border-b border-slate-100">
            <h3 className="text-xl font-bold text-slate-800 pr-24 truncate" title={consumer.name}>
              {consumer.name}
            </h3>
            
            <div className="flex items-center space-x-4 mt-3 mb-4 text-xs font-medium text-slate-500">
              <div className="flex items-center space-x-1 bg-slate-100 px-2 py-1 rounded-md">
                <Filter size={14} className="text-slate-400" />
                <span>{consumer.filterTag ? `Tag: ${consumer.filterTag}` : 'All events'}</span>
              </div>
              <div className="flex items-center space-x-1 bg-slate-100 px-2 py-1 rounded-md">
                <Calculator size={14} className="text-slate-400" />
                <span>{consumer.reducer}</span>
              </div>
            </div>

            <div className="mt-4 p-4 bg-slate-50 rounded-xl border border-slate-100">
              <div className="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">Materialized State</div>
              <div className="text-2xl font-mono text-blue-600 break-all">
                {consumer.currentValue === null ? (
                  <span className="text-slate-300 italic">No data</span>
                ) : (
                  String(consumer.currentValue)
                )}
              </div>
            </div>
          </div>

          {/* Republish Section */}
          <div className="bg-slate-50 p-4">
            {!showRepublishOpts ? (
              <button 
                onClick={() => setShowRepublishOpts(true)}
                disabled={consumer.currentValue === null}
                className="w-full flex items-center justify-center space-x-2 py-2 px-4 rounded-lg text-sm font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 disabled:opacity-50 disabled:hover:bg-blue-50 transition-colors"
              >
                <RefreshCw size={16} />
                <span>Republish to Log</span>
              </button>
            ) : (
              <div className="flex flex-col space-y-2 animate-in fade-in slide-in-from-top-2">
                <label className="text-xs font-semibold text-slate-500">Publish as tag:</label>
                <div className="flex space-x-2">
                  <input 
                    type="text" 
                    value={republishTag}
                    onChange={(e) => setRepublishTag(e.target.value)}
                    className="flex-1 px-3 py-1.5 text-sm rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none"
                  />
                  <button 
                    onClick={() => {
                      onRepublish(consumer, republishTag);
                      setShowRepublishOpts(false);
                    }}
                    className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors"
                  >
                    Send
                  </button>
                  <button 
                    onClick={() => setShowRepublishOpts(false)}
                    className="bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors"
                  >
                    Cancel
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
